<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuck's Dozens</title>
    <style>
        /* Load the True North Fonts */
        @font-face {
            font-family: 'True North Inline';
            src: url('TrueNorthInline-Regular.ttf') format('truetype'),
                 url('TrueNorthInline-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'True North Black';
            src: url('TrueNorth-Black.otf') format('opentype');
        }
        @font-face {
            font-family: 'True North Script';
            src: url('True North Script.otf') format('opentype');
        }

        /* Apply the Inline font to the whole page by default */
        body {
            font-family: 'True North Inline', sans-serif; 
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #fafafa;
            color: #333;
        }

        /* Header Layout - Flexbox used to push content to the right */
        header {
            padding: 2rem;
            background-color: #ffffff;
            border-bottom: 2px solid #eaeaea;
            display: flex;
            justify-content: flex-end; /* This pushes the logo to the right */
            align-items: center;
        }

        main {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        footer {
            padding: 3rem 2rem;
            background-color: #ffffff;
            border-top: 2px solid #eaeaea;
        }

        /* Email Link Styling */
        .email-link {
            color: #333;
            font-size: 1.5rem;
            text-decoration: none;
            border-bottom: 2px solid #333;
            transition: color 0.3s;
        }
        
        .email-link:hover {
            color: #777;
            border-color: #777;
        }
    </style>
</head>
<body>

    <header>
        <img src="chuck’s chicken eggs.svg" alt="Chuck's Dozens Logo" style="max-width: 300px;">
    </header>

    <main>
        <img src="eggsplainer.png" alt="Chuck's Dozens Eggsplainer">
    </main>

    <footer>
        <h2>Contact Us</h2>
        <p>
            <a href="mailto:nickfromoregon@gmail.com" class="email-link">nickfromoregon@gmail.com</a>
        </p>
    </footer>

</body>
</html>
